name: Backend CI

# trpg-backend/ 目录、本工作流文件自身、或者任何能影响 codegen 产物的
# trpg-sdk 路径变化时触发。那几条 trpg-sdk 路径是特意加的（见下面
# codegen-drift job 的说明）：只在 trpg-backend/** 上加 paths 过滤器的话，
# 一个只改了生成脚本、只手改了生成产物、或者只升级了生成器依赖版本的 PR
# 完全不会触发这个 workflow，漂移检查也就无从跑起。
#
# package.json / package-lock.json 也在列，因为生成器（json-schema-to-typescript）
# 的实际版本由它们锁定：升级生成器而不重新生成，产物同样会静默过时。
on:
  push:
    branches: [main]
    paths:
      - "trpg-backend/**"
      - "trpg-sdk/scripts/generate-types.ts"
      - "trpg-sdk/src/generated/**"
      - "trpg-sdk/package.json"
      - "trpg-sdk/package-lock.json"
      - ".github/workflows/trpg-backend-ci.yml"
  pull_request:
    paths:
      - "trpg-backend/**"
      - "trpg-sdk/scripts/generate-types.ts"
      - "trpg-sdk/src/generated/**"
      - "trpg-sdk/package.json"
      - "trpg-sdk/package-lock.json"
      - ".github/workflows/trpg-backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trpg-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 官方 action：在 runner 上安装 uv 本身。
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "trpg-backend/uv.lock"

      # 读 .python-version 文件，装一个匹配的 Python 解释器。
      - name: Set up Python
        run: uv python install

      # --locked：严格按 uv.lock 里锁定的版本安装，如果 pyproject.toml 和
      # uv.lock 不一致（比如改了依赖忘记重新 lock）会直接报错，而不是静默
      # 装一个不一致的版本。
      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Type check with ty
        run: uv run ty check

      - name: Run tests
        run: uv run pytest

  # 漂移检查（issue #75 决策 3）：重新跑一遍完整的 DTO -> JSON Schema -> TS
  # 生成管线，用 git diff 确认 trpg-sdk/src/generated/ 跟刚生成的结果一致。
  # 不一致说明有人改了后端 DTO（或手改了生成产物）却没有重新跑 codegen。
  #
  # 放在 backend CI 而不是 SDK CI：漂移检查要在"改坏契约的那个 PR"上就亮红灯
  # （而不是等某天有人恰好碰了 trpg-sdk/** 才发现），这要求它跟着
  # trpg-backend/** 的改动触发——SDK CI 的 paths 过滤器只认 trpg-sdk/**，一个
  # 纯改后端 DTO、忘记重新生成的 PR 根本不会碰 trpg-sdk/** 里的任何文件，放
  # 在 SDK CI 里根本不会触发，等于没测。代价是这个 job 需要同时装 Python(uv)
  # 和 Node，比单纯的 backend 测试慢一点，但这是这条检查要成立的前提，省不掉。
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "trpg-backend/uv.lock"

      - name: Set up Python
        working-directory: trpg-backend
        run: uv python install

      - name: Install backend dependencies
        working-directory: trpg-backend
        run: uv sync --locked

      - name: Export JSON Schema from backend DTOs
        working-directory: trpg-backend
        run: uv run python scripts/export_schema.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: trpg-sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: trpg-sdk
        run: npm ci

      - name: Generate TS types from JSON Schema
        working-directory: trpg-sdk
        run: npm run codegen

      - name: Fail if generated types are out of date
        run: |
          if ! git diff --exit-code -- trpg-sdk/src/generated; then
            echo "::error::trpg-sdk/src/generated/ 跟后端 DTO 不一致。改了 DTO 之后，" \
              "记得在 trpg-backend/ 跑 'uv run python scripts/export_schema.py'，" \
              "再在 trpg-sdk/ 跑 'npm run codegen'，把生成结果一并提交。"
            exit 1
          fi
